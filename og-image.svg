<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles (background) -->
  <circle cx="950" cy="100" r="280" fill="rgba(255,255,255,0.04)"/>
  <circle cx="950" cy="100" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(59,130,246,0.15)"/>
  <circle cx="60" cy="560" r="120" fill="rgba(167,139,250,0.1)"/>

  <!-- Neural network dots + lines (decorative, right side) -->
  <line x1="820" y1="80" x2="920" y2="160" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="920" y1="160" x2="1060" y2="120" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="1060" y1="120" x2="1100" y2="240" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="920" y1="160" x2="980" y2="280" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="980" y1="280" x2="1100" y2="240" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="820" y1="80" x2="750" y2="200" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="750" y1="200" x2="820" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="980" y1="280" x2="820" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <circle cx="820" cy="80" r="5" fill="rgba(167,139,250,0.7)" filter="url(#glow)"/>
  <circle cx="920" cy="160" r="7" fill="rgba(255,255,255,0.6)" filter="url(#glow)"/>
  <circle cx="1060" cy="120" r="4" fill="rgba(96,165,250,0.7)" filter="url(#glow)"/>
  <circle cx="1100" cy="240" r="6" fill="rgba(167,139,250,0.6)" filter="url(#glow)"/>
  <circle cx="980" cy="280" r="5" fill="rgba(255,255,255,0.5)" filter="url(#glow)"/>
  <circle cx="750" cy="200" r="4" fill="rgba(96,165,250,0.5)" filter="url(#glow)"/>
  <circle cx="820" cy="320" r="6" fill="rgba(167,139,250,0.5)" filter="url(#glow)"/>

  <!-- Accent line top -->
  <rect x="80" y="72" width="60" height="3" rx="2" fill="url(#accentLine)"/>

  <!-- Tag label -->
  <text x="80" y="108" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="4" text-transform="uppercase">AGENT IA · AUTOMATISATION</text>

  <!-- Main logo -->
  <text x="80" y="210" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="white" letter-spacing="-1">Flashcore</text>
  <text x="430" y="210" font-family="'Courier New', monospace" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#accentLine)"> IA</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="300" font-family="'Segoe UI', system-ui, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1.5">L'IA qui travaille</text>
  <text x="80" y="370" font-family="'Segoe UI', system-ui, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1.5">sans vous.</text>

  <!-- Divider -->
  <rect x="80" y="406" width="500" height="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Subtitle -->
  <text x="80" y="444" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.72)">Bots Telegram · Agents autonomes · Marketing IA · Résultats en 48h</text>

  <!-- Bottom pills -->
  <rect x="80" y="490" width="130" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="145" y="513" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">⚡ 48h</text>

  <rect x="224" y="490" width="130" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="289" y="513" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">🤖 24/7</text>

  <rect x="368" y="490" width="160" height="36" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="448" y="513" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">✦ Sans agence</text>

  <!-- URL bottom right -->
  <text x="1120" y="590" font-family="'Courier New', monospace" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="end">flashcore-ia.pages.dev</text>
</svg>
